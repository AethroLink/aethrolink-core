runtimes:
  mock_hermes:
    adapter: mock_hermes
    launch:
      mode: managed
      commands:
        coder: ["go", "run", "./cmd/fake-acp-client-agent"]
        research: ["go", "run", "./cmd/fake-acp-client-agent"]
        ops: ["go", "run", "./cmd/fake-acp-client-agent"]
    defaults:
      profile: coder
      session_strategy: sticky-process
    capabilities:
      - code.patch
      - code.review
      - research.topic

  mock_openclaw:
    adapter: mock_openclaw
    launch:
      mode: on_demand
      command: ["go", "run", "./cmd/fake-acp-client-agent"]
    defaults:
      session_key: main
      session_strategy: sticky-session-key
    capabilities:
      - ui.review
      - thread.reply
      - gateway.chat

  mock_researcher_http:
    adapter: mock_acp_comm_http
    endpoint: http://127.0.0.1:9102
    healthcheck: http://127.0.0.1:9102/ping
    launch:
      mode: managed
      command: ["go", "run", "./cmd/fake-acp-comm-agent", "--port", "9102"]
    capabilities:
      - summarize
      - research.topic

routes:
  code.patch:
    runtime: mock_hermes
    runtime_options:
      profile: coder
  research.topic:
    runtime: mock_hermes
    runtime_options:
      profile: research
  ui.review:
    runtime: mock_openclaw
    runtime_options:
      session_key: design
  summarize:
    runtime: mock_researcher_http
